name: Build & Release
run-name: Release ${{ github.ref_name }} — ${{ github.event.head_commit.message }}

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      # --publish never: electron-builder must NOT publish. softprops below is the
      # single uploader, so latest.yml (path uses the artifactName) always matches
      # the asset names. Letting electron-builder also publish caused name conflicts.
      - name: Build Windows installer
        run: npm run dist -- --publish never

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/*.yml
            dist/*.yaml
          draft: false
          # Release notes are authored explicitly (gh release create) with a
          # structured changelog, so don't let CI overwrite the body.
