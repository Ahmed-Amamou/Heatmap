<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Application Heatmap</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="widget">
    <!-- Full-widget drag region -->
    <div id="drag-overlay"></div>

    <div id="titlebar">
      <div id="title-group">
        <span id="title">Applications</span>
        <span id="stats"></span>
      </div>
      <div id="controls">
        <button id="btn-pin" title="Pin on top">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
            <path d="M4.456.734a1.75 1.75 0 0 1 2.826.504l.613 1.327a3.08 3.08 0 0 0 2.084 1.707l2.454.584c1.332.317 1.8 1.972.832 2.94L11.06 10l3.72 3.72a.75.75 0 1 1-1.06 1.06L10 11.06l-2.204 2.205c-.968.968-2.623.5-2.94-.832l-.584-2.454a3.08 3.08 0 0 0-1.707-2.084l-1.327-.613a1.75 1.75 0 0 1-.504-2.826L4.456.734Z"/>
          </svg>
        </button>
        <button id="btn-refresh" title="Refresh">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 2.5a5.487 5.487 0 0 0-4.131 1.869l1.204 1.204A.25.25 0 0 1 4.896 6H1.25A.25.25 0 0 1 1 5.75V2.104a.25.25 0 0 1 .427-.177l1.38 1.38A7.001 7.001 0 0 1 14.95 7.16a.75.75 0 1 1-1.49.178A5.501 5.501 0 0 0 8 2.5ZM1.705 8.005a.75.75 0 0 1 .834.656 5.501 5.501 0 0 0 9.592 2.97l-1.204-1.204a.25.25 0 0 1 .177-.427h3.646a.25.25 0 0 1 .25.25v3.646a.25.25 0 0 1-.427.177l-1.38-1.38A7.001 7.001 0 0 1 1.05 8.84a.75.75 0 0 1 .656-.834Z"/>
          </svg>
        </button>
        <button id="btn-settings" title="Settings">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 0a8.2 8.2 0 0 1 .701.031C9.444.095 9.99.645 10.16 1.29l.288 1.107c.018.066.079.158.212.224.231.114.454.243.668.386.123.082.233.09.3.071l1.102-.303c.644-.176 1.392.021 1.82.63.274.39.487.819.637 1.282.15.463.235.95.254 1.453.012.306-.18.693-.508.918l-.878.623a.36.36 0 0 0-.145.27c-.01.236-.035.47-.075.7a.348.348 0 0 0 .095.286l.84.687c.323.265.47.661.376 1.044a7.42 7.42 0 0 1-.358 1.14 7.13 7.13 0 0 1-.545 1.039c-.265.413-.794.614-1.372.457l-1.084-.295a.365.365 0 0 0-.296.042 5.863 5.863 0 0 1-.653.375c-.116.054-.196.127-.21.191l-.286 1.107c-.168.646-.715 1.196-1.458 1.26a8.006 8.006 0 0 1-1.402 0c-.743-.064-1.289-.614-1.458-1.26l-.286-1.107a.358.358 0 0 0-.21-.191 5.94 5.94 0 0 1-.653-.375.364.364 0 0 0-.296-.042l-1.084.295c-.578.157-1.107-.044-1.372-.457a7.123 7.123 0 0 1-.545-1.039 7.394 7.394 0 0 1-.358-1.14c-.094-.383.053-.779.376-1.044l.84-.687a.348.348 0 0 0 .095-.286 5.316 5.316 0 0 1-.075-.7.36.36 0 0 0-.145-.27l-.878-.623c-.328-.225-.52-.612-.508-.918a7.23 7.23 0 0 1 .254-1.453c.15-.463.363-.892.637-1.282.428-.61 1.176-.806 1.82-.63l1.102.303c.067.019.177.011.3-.071.214-.143.437-.272.668-.386.133-.066.194-.158.211-.224l.29-1.107C6.009.645 6.556.095 7.299.03 7.53.01 7.764 0 8 0Zm-.571 1.525c-.036.003-.075.006-.115.01l-.27 1.047c-.112.433-.5.822-.96 1.05-.25.123-.492.258-.723.406-.34.22-.787.296-1.205.182l-1.04-.287a5.79 5.79 0 0 0-.3.6 5.93 5.93 0 0 0-.225.578l.83.59c.35.249.595.671.615 1.14.012.27.03.538.063.8.049.386-.1.8-.4 1.046l-.793.648c.042.18.093.356.155.527.063.175.137.345.221.507l1.023-.28c.415-.113.87-.05 1.216.175.234.152.483.29.742.41.46.215.849.593.966 1.025l.271 1.048c.075.003.151.003.226 0l.27-1.048c.117-.432.506-.81.967-1.025.259-.12.508-.258.742-.41.347-.225.801-.287 1.216-.175l1.023.28c.084-.162.158-.332.221-.507.062-.171.113-.347.155-.527l-.793-.648c-.3-.245-.449-.66-.4-1.045.033-.263.051-.53.063-.801.02-.47.265-.891.615-1.14l.83-.59a5.899 5.899 0 0 0-.225-.578 5.847 5.847 0 0 0-.3-.6l-1.04.286c-.418.114-.866.038-1.205-.182a5.03 5.03 0 0 0-.723-.405c-.46-.229-.848-.618-.96-1.05l-.27-1.048a4.147 4.147 0 0 0-.115-.01h-.114ZM8 5.5a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5ZM8 7a1 1 0 1 0 0 2 1 1 0 0 0 0-2Z"/>
          </svg>
        </button>
        <button id="btn-minimize" title="Minimize to tray">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
            <path d="M3.75 7.25a.75.75 0 0 0 0 1.5h8.5a.75.75 0 0 0 0-1.5h-8.5Z"/>
          </svg>
        </button>
        <button id="btn-close" title="Quit">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
            <path d="M3.72 3.72a.75.75 0 0 1 1.06 0L8 6.94l3.22-3.22a.75.75 0 1 1 1.06 1.06L9.06 8l3.22 3.22a.75.75 0 1 1-1.06 1.06L8 9.06l-3.22 3.22a.75.75 0 0 1-1.06-1.06L6.94 8 3.72 4.78a.75.75 0 0 1 0-1.06Z"/>
          </svg>
        </button>
      </div>
    </div>

    <div id="heatmap-container">
      <div id="month-labels"></div>
      <div id="heatmap-wrapper">
        <div id="day-labels">
          <span></span>
          <span>Mon</span>
          <span></span>
          <span>Wed</span>
          <span></span>
          <span>Fri</span>
          <span></span>
        </div>
        <div id="heatmap"></div>
      </div>
    </div>

    <div id="legend">
      <span>Less</span>
      <div class="legend-cell" data-level="0"></div>
      <div class="legend-cell" data-level="1"></div>
      <div class="legend-cell" data-level="2"></div>
      <div class="legend-cell" data-level="3"></div>
      <div class="legend-cell" data-level="4"></div>
      <span>More</span>
    </div>

    <div id="tooltip" class="hidden"></div>
    <div id="loading">Loading data</div>
    <div id="error" class="hidden"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
