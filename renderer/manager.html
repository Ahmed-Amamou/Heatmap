<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Applications</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="settings.css">
  <link rel="stylesheet" href="manager.css">
  <script>
    // Anchor the open animation to the icon the user clicked (passed as ox/oy
    // percentages). Set before body renders so the first frame uses it.
    (function () {
      const p = new URLSearchParams(location.search);
      const ox = p.get('ox'), oy = p.get('oy');
      if (ox !== null && oy !== null) {
        document.documentElement.style.setProperty('--zoom-origin', `${ox}% ${oy}%`);
      }
    })();
  </script>
</head>
<body>
  <div id="manager">
    <div id="manager-header">
      <div class="header-left">
        <span class="manager-title">Applications</span>
        <span id="count-badge"></span>
      </div>
      <div class="header-actions">
        <input type="search" id="search" placeholder="Search…" spellcheck="false">
        <button id="btn-agenda" class="btn-secondary" title="Upcoming interviews">Agenda<span id="agenda-count" class="hidden"></span></button>
        <button id="btn-stats" class="btn-secondary" title="Toggle insights">Insights</button>
        <button id="btn-export" class="btn-secondary" title="Export the current view as Markdown (LLM-friendly)">Export ALL</button>
        <button id="btn-new" class="btn-primary">+ New</button>
        <button id="btn-close-manager" title="Close">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
            <path d="M3.72 3.72a.75.75 0 0 1 1.06 0L8 6.94l3.22-3.22a.75.75 0 1 1 1.06 1.06L9.06 8l3.22 3.22a.75.75 0 1 1-1.06 1.06L8 9.06l-3.22 3.22a.75.75 0 0 1-1.06-1.06L6.94 8 3.72 4.78a.75.75 0 0 1 0-1.06Z"/>
          </svg>
        </button>
      </div>
    </div>

    <div id="autoreject-banner" class="hidden">
      <span class="ar-dot"></span>
      <span id="autoreject-text"></span>
      <button type="button" id="autoreject-view">View</button>
      <button type="button" id="autoreject-dismiss" title="Dismiss">
        <svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor">
          <path d="M3.72 3.72a.75.75 0 0 1 1.06 0L8 6.94l3.22-3.22a.75.75 0 1 1 1.06 1.06L9.06 8l3.22 3.22a.75.75 0 1 1-1.06 1.06L8 9.06l-3.22 3.22a.75.75 0 0 1-1.06-1.06L6.94 8 3.72 4.78a.75.75 0 0 1 0-1.06Z"/>
        </svg>
      </button>
    </div>

    <div id="stats-panel" class="collapsed">
      <div id="metrics"></div>
      <div id="funnel"></div>
    </div>

    <div id="agenda-panel" class="collapsed">
      <div id="agenda"></div>
    </div>

    <div id="toolbar">
      <div id="filters"></div>
      <div class="toolbar-right">
        <span class="sort-label">Sort</span>
        <div class="dropdown" id="sort-dd">
          <div class="dd-control" id="sort-control" tabindex="0">
            <span id="sort-value">Newest</span>
            <svg class="ms-caret" width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
              <path d="M4.22 6.22a.75.75 0 0 1 1.06 0L8 8.94l2.72-2.72a.75.75 0 1 1 1.06 1.06l-3.25 3.25a.75.75 0 0 1-1.06 0L4.22 7.28a.75.75 0 0 1 0-1.06Z"/>
            </svg>
          </div>
          <div class="dd-panel hidden" id="sort-panel"></div>
        </div>
      </div>
    </div>

    <div id="manager-body">
      <div id="list-pane">
        <table id="apps-table">
          <thead>
            <tr>
              <th>Job Title</th>
              <th>Job Type</th>
              <th>Company</th>
              <th>Date</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="apps-tbody"></tbody>
        </table>
        <div id="empty-state" class="hidden">No applications yet. Click <b>+ New</b> to add one.</div>
      </div>

      <div id="editor-resizer" class="hidden" title="Drag to resize"></div>
      <form id="editor" class="hidden">
        <input type="hidden" id="f-id">
        <div id="autoreject-flag" class="hidden">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
            <path d="M3 1.75a.75.75 0 0 0-1.5 0v12.5a.75.75 0 0 0 1.5 0v-3.7l.4-.1c1.5-.38 2.6.05 3.86.55 1.3.52 2.78 1.1 4.84.58l1.27-.32a.95.95 0 0 0 .73-.92V3.16a.75.75 0 0 0-.93-.73l-1.5.38c-1.5.37-2.6-.06-3.86-.56C6.5 1.73 5.02 1.15 2.96 1.67L3 1.68v.07Z"/>
          </svg>
          <span id="autoreject-flag-text"></span>
        </div>
        <div class="ed-grid">
          <div class="field span-2">
            <label for="f-job_title">Job Title</label>
            <input type="text" id="f-job_title" spellcheck="false">
          </div>
          <div class="field">
            <label for="f-company">Company</label>
            <input type="text" id="f-company" spellcheck="false">
          </div>
          <div class="field">
            <label for="f-location">Location</label>
            <input type="text" id="f-location" spellcheck="false">
          </div>
          <div class="field">
            <label for="f-applying_date">Applying Date</label>
            <input type="date" id="f-applying_date">
          </div>
          <div class="field">
            <label>Job Type</label>
            <div class="multiselect" id="jobtype-ms">
              <div class="ms-control" id="jobtype-control" tabindex="0">
                <span id="jobtype-value" class="ms-placeholder">Select…</span>
                <svg class="ms-caret" width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
                  <path d="M4.22 6.22a.75.75 0 0 1 1.06 0L8 8.94l2.72-2.72a.75.75 0 1 1 1.06 1.06l-3.25 3.25a.75.75 0 0 1-1.06 0L4.22 7.28a.75.75 0 0 1 0-1.06Z"/>
                </svg>
              </div>
              <div class="ms-panel hidden" id="jobtype-panel"></div>
            </div>
            <input type="hidden" id="f-job_type">
          </div>
          <div class="field">
            <label>Status</label>
            <div class="multiselect" id="status-ms">
              <div class="ms-control" id="status-control" tabindex="0">
                <div class="ms-chips" id="status-chips"></div>
                <svg class="ms-caret" width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
                  <path d="M4.22 6.22a.75.75 0 0 1 1.06 0L8 8.94l2.72-2.72a.75.75 0 1 1 1.06 1.06l-3.25 3.25a.75.75 0 0 1-1.06 0L4.22 7.28a.75.75 0 0 1 0-1.06Z"/>
                </svg>
              </div>
              <div class="ms-panel hidden" id="status-panel"></div>
            </div>
            <input type="hidden" id="f-status">
          </div>
          <div class="field">
            <label for="f-resume_version">Resume Version</label>
            <input type="text" id="f-resume_version" spellcheck="false">
          </div>
          <div class="field span-2">
            <button type="button" class="iv-section-toggle collapsed" id="iv-section-toggle" aria-expanded="false">
              <span class="iv-section-title">Interviews<span id="iv-count-badge" class="iv-count-badge hidden"></span></span>
              <svg class="iv-chevron" width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
                <path d="M4.22 6.22a.75.75 0 0 1 1.06 0L8 8.94l2.72-2.72a.75.75 0 1 1 1.06 1.06l-3.25 3.25a.75.75 0 0 1-1.06 0L4.22 7.28a.75.75 0 0 1 0-1.06Z"/>
              </svg>
            </button>
            <div id="iv-section-body" class="collapsed">
              <div id="interview-list"></div>
              <button type="button" id="btn-add-interview" class="iv-add">+ Add interview</button>
            </div>
          </div>
          <div class="field span-2">
            <label for="f-contact">Contact</label>
            <input type="text" id="f-contact" spellcheck="false">
          </div>
          <div class="field span-2">
            <label for="f-description">Description</label>
            <textarea id="f-description" rows="2" spellcheck="false"></textarea>
          </div>
          <div class="field span-2">
            <label for="f-notes">Notes</label>
            <textarea id="f-notes" rows="2" spellcheck="false"></textarea>
          </div>
        </div>

        <div class="editor-actions">
          <button type="button" id="btn-delete" class="btn-danger hidden">Delete</button>
          <button type="button" id="btn-export-one" class="btn-secondary hidden" title="Export this application as Markdown (LLM-friendly)">Export</button>
          <span id="sync-status" class="field-hint"></span>
          <div class="spacer"></div>
          <button type="button" id="btn-cancel" class="btn-secondary" title="Close the editor (pending changes are auto-saved)">Close</button>
          <button type="submit" id="btn-save-app" class="btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="hidden"></div>

  <div id="confirm-overlay" class="hidden">
    <div id="confirm-box">
      <div id="confirm-title">Delete application?</div>
      <div id="confirm-message">This removes it from the local database and the Google Sheet. This cannot be undone.</div>
      <div id="confirm-actions">
        <button type="button" id="confirm-cancel" class="btn-secondary">Cancel</button>
        <button type="button" id="confirm-ok" class="btn-danger">Delete</button>
      </div>
    </div>
  </div>
  <script src="manager.js"></script>
</body>
</html>
